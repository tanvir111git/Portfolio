<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page not found</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a0e14; --text:#e8ecf1; --accent:#5eead4; --muted:#8b95a7; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono', monospace;
    height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:20px;
  }
  h1{ font-family:'Space Grotesk',sans-serif; font-size:clamp(3rem,10vw,6rem); color:var(--accent); }
  p{ color:var(--muted); margin:14px 0 28px; font-size:15px; }
  a{
    color:var(--bg); background:var(--accent);
    padding:12px 24px; border-radius:999px; text-decoration:none;
    font-weight:500; font-size:14px;
  }
</style>
</head>
<body>
  <h1>404</h1>
  <p>$ cd /page-you-wanted &nbsp;→&nbsp; bash: no such directory</p>
  <a href="/">← Back to home</a>
</body>
</html>
